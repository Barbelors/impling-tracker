<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Impling Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-bright: #f0c84a;
    --red: #8b1a1a;
    --red-bright: #cc2200;
    --bg: #0a0705;
    --bg2: #110e08;
    --bg3: #1a1408;
    --border: #3a2e18;
    --text: #d4b896;
    --text-dim: #7a6a50;
    --green: #4a8c3f;
    --green-bright: #6dbf5f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Text', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background embers */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 40% at 50% 100%, rgba(139,26,26,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 20% 50%, rgba(201,168,76,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 30%, rgba(201,168,76,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 40px;
  }

  .dragon-icon {
    font-size: 52px;
    display: block;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 20px rgba(201,168,76,0.6));
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--gold-bright);
    text-shadow: 0 0 30px rgba(201,168,76,0.5), 0 2px 4px rgba(0,0,0,0.8);
    letter-spacing: 0.05em;
    line-height: 1.1;
  }

  .subtitle {
    font-size: 1rem;
    color: var(--text-dim);
    margin-top: 6px;
    font-style: italic;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 18px;
    margin-bottom: 24px;
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pulse-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.3s;
  }

  .pulse-dot.active {
    background: var(--green-bright);
    box-shadow: 0 0 8px var(--green-bright);
    animation: pulse 1.5s ease-in-out infinite;
  }

  .pulse-dot.error {
    background: var(--red-bright);
    box-shadow: 0 0 8px var(--red-bright);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text { color: var(--text-dim); }
  .status-text span { color: var(--text); }

  .next-poll {
    color: var(--text-dim);
    font-size: 0.7rem;
  }

  /* Alert flash overlay */
  #alert-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(139,26,26,0.25);
    z-index: 100;
    pointer-events: none;
    animation: flashRed 0.5s ease-in-out 3;
  }

  @keyframes flashRed {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }

  /* Alert banner */
  #alert-banner {
    display: none;
    background: linear-gradient(135deg, #3a0a0a, #1a0505);
    border: 2px solid var(--red-bright);
    border-radius: 6px;
    padding: 16px 20px;
    margin-bottom: 20px;
    box-shadow: 0 0 30px rgba(204,34,0,0.4), inset 0 1px 0 rgba(255,100,50,0.2);
    animation: slideIn 0.3s ease-out;
  }

  @keyframes slideIn {
    from { transform: translateY(-10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .alert-title {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: #ff6644;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .alert-entry {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid rgba(139,26,26,0.3);
    font-size: 1rem;
  }

  .alert-entry:last-child { border-bottom: none; }

  .alert-world {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: var(--gold-bright);
    font-size: 0.9rem;
  }

  .alert-map-link {
    color: #88aaff;
    text-decoration: none;
    font-size: 0.85rem;
    font-style: italic;
    transition: color 0.2s;
  }

  .alert-map-link:hover { color: #aaccff; text-decoration: underline; }

  /* Main sightings panel */
  .panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .panel-header {
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-title {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.1em;
  }

  .sighting-count {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: var(--text-dim);
  }

  /* Table */
  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-align: left;
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
  }

  tbody tr {
    border-bottom: 1px solid rgba(58,46,24,0.4);
    transition: background 0.15s;
  }

  tbody tr:hover { background: rgba(201,168,76,0.04); }

  tbody tr.new-entry {
    animation: highlightNew 2s ease-out forwards;
  }

  @keyframes highlightNew {
    0% { background: rgba(139,26,26,0.3); }
    100% { background: transparent; }
  }

  td {
    padding: 11px 18px;
    font-size: 1rem;
    vertical-align: middle;
  }

  .td-world {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: var(--gold-bright);
    font-size: 0.9rem;
  }

  .td-location { color: var(--text); }
  .td-coords { color: var(--text-dim); font-size: 0.85rem; font-style: italic; }

  .td-time {
    color: var(--text-dim);
    font-size: 0.85rem;
    white-space: nowrap;
  }

  .td-map a {
    color: #88aaff;
    text-decoration: none;
    font-size: 0.85rem;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    border: 1px solid rgba(136,170,255,0.3);
    padding: 3px 8px;
    border-radius: 2px;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .td-map a:hover {
    background: rgba(136,170,255,0.1);
    border-color: rgba(136,170,255,0.6);
    color: #aaccff;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state p { font-style: italic; font-size: 1rem; }

  /* Footer */
  footer {
    text-align: center;
    margin-top: 32px;
    color: var(--text-dim);
    font-size: 0.8rem;
    font-style: italic;
  }

  footer a { color: var(--text-dim); }

  /* Decorative divider */
  .divider {
    text-align: center;
    color: var(--border);
    letter-spacing: 0.3em;
    font-size: 0.7rem;
    margin: 6px 0 16px;
    font-family: 'Cinzel', serif;
  }
</style>
</head>
<body>

<div id="alert-overlay"></div>

<div class="container">
  <header>
    <span class="dragon-icon">🐉</span>
    <h1>Dragon Impling Tracker</h1>
    <div class="subtitle">Live sightings — refreshes every 10 seconds</div>
  </header>

  <div class="status-bar">
    <div class="status-indicator">
      <div class="pulse-dot" id="pulse-dot"></div>
      <span class="status-text" id="status-text">Connecting...</span>
    </div>
    <div class="next-poll" id="next-poll">—</div>
  </div>

  <div id="alert-banner">
    <div class="alert-title">⚔ NEW DRAGON IMPLING SPOTTED</div>
    <div id="alert-entries"></div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">RECENT SIGHTINGS</span>
      <span class="sighting-count" id="sighting-count">—</span>
    </div>
    <div id="table-wrapper">
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <p>Waiting for first fetch...</p>
      </div>
    </div>
  </div>

  <footer>
    Data sourced from the OSRS Impling crowdsource plugin &nbsp;·&nbsp; NPC ID 1644 &amp; 1654
  </footer>
</div>

<script>
  const API_BASE = 'https://puos0bfgxc2lno5-implingdb.adb.us-phoenix-1.oraclecloudapps.com/ords/impling/implingdev/dev';
  const API_URL = API_BASE;
  const DRAGON_IDS = new Set([1644, 1654]);
  const POLL_INTERVAL = 10000; // 10 seconds
  const MAX_ROWS = 50;

  let knownIds = new Set();
  let sightings = [];
  let countdown = POLL_INTERVAL / 1000;
  let countdownTimer = null;

  // Sound alert using Web Audio API
  function playAlert() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const times = [0, 0.15, 0.3];
      times.forEach(t => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = t === 0.3 ? 880 : 660;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime + t);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.12);
        osc.start(ctx.currentTime + t);
        osc.stop(ctx.currentTime + t + 0.15);
      });
    } catch(e) {}
  }

  function flashScreen() {
    const overlay = document.getElementById('alert-overlay');
    overlay.style.display = 'block';
    overlay.style.animation = 'none';
    overlay.offsetHeight; // reflow
    overlay.style.animation = 'flashRed 0.5s ease-in-out 3';
    setTimeout(() => overlay.style.display = 'none', 1600);
  }

  function getMapLink(x, y) {
    return `https://oldschool.runescape.wiki/dpt/#map=9/${x}/${y}/0`;
  }

  function timeAgo(isoString) {
    const diff = Math.floor((Date.now() - new Date(isoString)) / 1000);
    if (diff < 60) return `${diff}s ago`;
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    return `${Math.floor(diff/3600)}h ago`;
  }

  function guessLocation(x, y) {
    // Very rough region guessing based on coords
    if (x >= 2550 && x <= 2700 && y >= 4200 && y <= 4400) return 'Waterbirth Island';
    if (x >= 3200 && x <= 3350 && y >= 6050 && y <= 6200) return 'Prifddinas / Gauntlet';
    if (x >= 2900 && x <= 3050 && y >= 3200 && y <= 3350) return 'Feldip Hills';
    if (x >= 3100 && x <= 3300 && y >= 3150 && y <= 3300) return 'Karamja / Ardougne';
    if (x >= 1200 && x <= 1400 && y >= 3700 && y <= 3850) return 'Tirannwn';
    if (x >= 1500 && x <= 1700 && y >= 3400 && y <= 3550) return 'Lletya Area';
    if (x >= 2700 && x <= 2900 && y >= 2950 && y <= 3100) return 'Feldip Hills South';
    if (x >= 3200 && x <= 3400 && y >= 3400 && y <= 3550) return 'Varrock Area';
    if (x >= 3000 && x <= 3200 && y >= 3300 && y <= 3500) return 'Lumbridge / Al-Kharid';
    return 'Gielinor';
  }

  function renderTable() {
    const wrapper = document.getElementById('table-wrapper');
    document.getElementById('sighting-count', );

    if (sightings.length === 0) {
      wrapper.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>No dragon implings spotted yet — watching...</p></div>`;
      document.getElementById('sighting-count').textContent = '0 sightings';
      return;
    }

    document.getElementById('sighting-count').textContent = `${sightings.length} sighting${sightings.length !== 1 ? 's' : ''}`;

    const rows = sightings.map((s, i) => `
      <tr class="${s.isNew ? 'new-entry' : ''}" data-id="${s.uniqueId}">
        <td class="td-world">W${s.world}</td>
        <td class="td-location">
          ${guessLocation(s.xcoord, s.ycoord)}
          <div class="td-coords">${s.xcoord}, ${s.ycoord}</div>
        </td>
        <td class="td-time">${timeAgo(s.insertedtime)}</td>
        <td class="td-map"><a href="${getMapLink(s.xcoord, s.ycoord)}" target="_blank">VIEW MAP →</a></td>
      </tr>
    `).join('');

    wrapper.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>WORLD</th>
            <th>LOCATION</th>
            <th>SPOTTED</th>
            <th>MAP</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;

    // Clear new flags after animation
    setTimeout(() => {
      sightings.forEach(s => s.isNew = false);
    }, 2100);
  }

  async function fetchImplings() {
    const dot = document.getElementById('pulse-dot');
    const statusText = document.getElementById('status-text');

    try {
      // Fetch multiple pages to get all recent data
      let allItems = [];
      let url = API_URL;
      let pages = 0;

      while (url && pages < 4) {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        allItems = allItems.concat(data.items || []);
        // Check next page
        const nextLink = (data.links || []).find(l => l.rel === 'next');
        url = (data.hasMore && nextLink) ? nextLink.href : null;
        pages++;
      }

      // Filter dragon implings
      const dragons = allItems.filter(item => DRAGON_IDS.has(item.npcid));

      // Find new ones
      const newOnes = dragons.filter(item => {
        const uid = `${item.world}-${item.xcoord}-${item.ycoord}-${item.discoveredtime}`;
        return !knownIds.has(uid);
      });

      if (newOnes.length > 0) {
        playAlert();
        flashScreen();

        // Show alert banner
        const banner = document.getElementById('alert-banner');
        const alertEntries = document.getElementById('alert-entries');
        banner.style.display = 'block';
        banner.style.animation = 'none';
        banner.offsetHeight;
        banner.style.animation = 'slideIn 0.3s ease-out';

        alertEntries.innerHTML = newOnes.map(s => `
          <div class="alert-entry">
            <span class="alert-world">World ${s.world}</span>
            <span>${guessLocation(s.xcoord, s.ycoord)} &nbsp;(${s.xcoord}, ${s.ycoord})</span>
            <a class="alert-map-link" href="${getMapLink(s.xcoord, s.ycoord)}" target="_blank">Open Map →</a>
          </div>
        `).join('');

        // Add to sightings
        newOnes.forEach(item => {
          const uid = `${item.world}-${item.xcoord}-${item.ycoord}-${item.discoveredtime}`;
          knownIds.add(uid);
          sightings.unshift({ ...item, uniqueId: uid, isNew: true });
        });

        // Trim
        if (sightings.length > MAX_ROWS) sightings = sightings.slice(0, MAX_ROWS);
      }

      // Update existing times
      dot.className = 'pulse-dot active';
      statusText.innerHTML = `<span>LIVE</span> — last updated ${new Date().toLocaleTimeString()}`;

      renderTable();

    } catch (err) {
      dot.className = 'pulse-dot error';
      statusText.innerHTML = `<span style="color:var(--red-bright)">ERROR</span> — ${err.message}`;
      console.error(err);
    }
  }

  function startCountdown() {
    clearInterval(countdownTimer);
    countdown = POLL_INTERVAL / 1000;
    countdownTimer = setInterval(() => {
      countdown--;
      document.getElementById('next-poll').textContent = `Next check in ${countdown}s`;
      if (countdown <= 0) clearInterval(countdownTimer);
    }, 1000);
  }

  function poll() {
    fetchImplings();
    startCountdown();
  }

  // Initial fetch then poll
  poll();
  setInterval(poll, POLL_INTERVAL);

  // Refresh time-ago labels every 30s
  setInterval(() => renderTable(), 30000);
</script>
</body>
</html>
